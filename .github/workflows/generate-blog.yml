name: Generate Static Blog

on:
  push:
    branches: [ main ]
    paths:
      - 'blog/posts/**'
      - 'template-blog.html'
      - 'go/redirects.json'
      - 'assets/images/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install markdown python-frontmatter pyyaml

    - name: Generate blog articles and index
      run: python generate_blog.py

    - name: Generate /go/ redirects
      run: python generate_redirects.py

    - name: Commit and push generated files
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add blog/ go/
        git commit -m "chore: regenerate blog and redirects [skip ci]" || echo "No changes to commit"
        git push
